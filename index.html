* { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --ink:        #060605;
  --ink-2:      #0c0c0a;
  --paper:      #F4EFE3;
  --paper-90:   rgba(244,239,227,0.94);
  --paper-78:   rgba(244,239,227,0.80);
  --paper-55:   rgba(244,239,227,0.58);
  --paper-38:   rgba(244,239,227,0.40);
  --paper-22:   rgba(244,239,227,0.24);
  --paper-14:   rgba(244,239,227,0.14);
  --signal:     #E8930D;
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); }
body { font-family: 'Px Grotesk', sans-serif; color: var(--paper); }

.tv {
  width: 1920px;
  height: 1080px;
  background:
    radial-gradient(circle at 50% 46%, rgba(244,239,227,0.05), transparent 46%),
    var(--ink);
  padding: 56px 88px 46px;
  display: grid;
  grid-template-rows: 108px minmax(0,1fr) 88px;
  gap: 30px;
  position: relative;
}
.tv::before {
  content: "";
  position: absolute;
  inset: 26px;
  border: 1px solid var(--paper-14);
  pointer-events: none;
}

.header, .content, .footer { position: relative; z-index: 2; }

/* ── HEADER ── */
.header {
  display: grid;
  grid-template-columns: 420px 1fr;
  align-items: end;
  gap: 44px;
  border-bottom: 1px solid var(--paper-14);
  padding-bottom: 18px;
}
.brand-small {
  font-size: 16px; font-weight: 700; letter-spacing: 0.26em;
  text-transform: uppercase; color: var(--signal);
  margin-bottom: 16px; white-space: nowrap;
  display: flex; align-items: center; gap: 12px;
}
.brand-small::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%;
  background: var(--signal); display: inline-block;
  animation: breathe 3.4s ease-in-out infinite;
}
.brand {
  font-weight: 700; font-size: 74px; line-height: 0.86;
  letter-spacing: -0.02em; text-transform: uppercase; color: var(--paper);
}
.category-title {
  font-weight: 700; font-size: 104px; line-height: 0.84;
  letter-spacing: -0.02em; text-transform: uppercase; color: var(--paper);
  text-align: right; white-space: nowrap;
}
.category-subtitle {
  margin-top: 14px; font-size: 19px; font-weight: 700; line-height: 1;
  text-transform: uppercase; letter-spacing: 0.16em; color: var(--paper-55);
  text-align: right;
}

/* ── CONTENT / MENU ITEMS ── */
.content {
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px 48px;
  align-content: start;
  overflow: hidden;
  padding-top: 6px;
}
.content.single { grid-template-columns: 1fr; max-width: 1180px; margin: 0 auto; width: 100%; }

.item {
  min-height: 82px;
  padding: 15px 0;
  border-bottom: 1px solid var(--paper-14);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: center;
  opacity: 0;
  transform: translateY(16px);
  clip-path: inset(0 100% 0 0);
}
.item.reveal {
  animation: itemReveal 0.72s cubic-bezier(0.2,0.78,0.18,1) forwards;
  animation-delay: calc(var(--i) * 78ms);
}
@keyframes itemReveal {
  0% { opacity: 0; transform: translateY(16px); clip-path: inset(0 100% 0 0); }
  48% { opacity: 1; }
  100% { opacity: 1; transform: translateY(0); clip-path: inset(0 0 0 0); }
}

.name { font-size: 33px; line-height: 1.05; font-weight: 700; letter-spacing: -0.01em; color: var(--paper); text-transform: uppercase; }

let index = 0;
let timer;
let mode = null; // 'menu' | 'teaser'
let manualOpen = false;

const titleEl       = document.getElementById('categoryTitle');
const subtitleEl     = document.getElementById('categorySubtitle');
const content        = document.getElementById('content');
const nav            = document.getElementById('nav');
const progressEl     = document.getElementById('progress');
const wipe           = document.getElementById('wipe');
const lastCallLabel  = document.getElementById('lastCallLabel');
const teaser         = document.getElementById('teaser');
const teaserDateVal  = document.getElementById('teaserDateValue');
const teaserLineup   = document.getElementById('teaserLineup');
const teaserCountdown = document.getElementById('teaserCountdown');
const teaserClock    = document.getElementById('teaserClock');
const manualBadge    = document.getElementById('manualBadge');

document.documentElement.style.setProperty('--duration', `${SLIDE_DURATION}ms`);

// ---- CE SOIR : trouve la programmation du jour selon la date réelle ----
function tonight() {
  const now = new Date();
  if (now.getMonth() === 6) { // juillet = index 6
    const found = nights.find(n => n.day === now.getDate());
    if (found) return found;
  }
  return null;
}

// ---- HORLOGE & LOGIQUE HORAIRE ----
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const hStr = String(h).padStart(2,'0');
  const mStr = String(m).padStart(2,'0');
  const timeStr = hStr + ':' + mStr;
  document.getElementById('clockTime').textContent = timeStr;
  teaserClock.textContent = timeStr;

  let mins = h * 60 + m;
  if (h < 11) mins += 24 * 60;

  const ouverture = 22 * 60;
  const lastCallM = (24 + 2) * 60 + 45;
  const fermeture = (24 + 3) * 60;

  const isOpen = (mins >= ouverture && mins < fermeture);

  // Les heures réelles reprennent le dessus dès qu'elles s'appliquent —
  // le mode manuel ne sert qu'à ouvrir en dehors des heures normales.
  if (isOpen) manualOpen = false;

  if (manualOpen) {
    manualBadge.classList.add('show');
    lastCallLabel.classList.remove('urgent');
    lastCallLabel.innerHTML = 'Mode manuel <span>actif</span>';
    setMode('menu');
    return;
  }
  manualBadge.classList.remove('show');

  if (!isOpen) {
    lastCallLabel.classList.remove('urgent');
    lastCallLabel.innerHTML = 'Ouvre \u00e0 <span>22h00</span>';
    setMode('teaser');
    updateTeaserCountdown(mins, ouverture);
  } else if (mins >= lastCallM) {
    lastCallLabel.classList.add('urgent');
    lastCallLabel.innerHTML = '<span>LAST CALL TERMIN\u00c9</span>';
    setMode('menu');
  } else {
    const diff = lastCallM - mins;
    if (diff <= 30) {
      lastCallLabel.classList.add('urgent');
      lastCallLabel.innerHTML = 'Last call dans <span>' + diff + ' min</span>';
    } else {
      lastCallLabel.classList.remove('urgent');
      lastCallLabel.innerHTML = 'LAST CALL <span>2h45</span>';
    }
    setMode('menu');
  }
}

function manualOverride() {
  manualOpen = true;
  updateClock();
}

function manualRelease() {
  manualOpen = false;
  updateClock();
}

function updateTeaserCountdown(mins, ouverture) {
  let diff = ouverture - mins;
  if (diff < 0) diff += 24 * 60; // wrap past midnight reference
  if (diff <= 0) {
    teaserCountdown.textContent = 'Ouvre à 22h00';
  } else if (diff <= 120) {
    const hh = Math.floor(diff / 60);
    const mm = diff % 60;
    teaserCountdown.textContent = hh > 0
      ? `Ouvre dans ${hh}h${String(mm).padStart(2,'0')}`
      : `Ouvre dans ${mm} min`;
  } else {
    teaserCountdown.textContent = 'Ouvre à 22h00';
  }
}

function renderTeaser() {
  const t = tonight();
  if (t) {
    document.getElementById('teaserDateLabel').textContent = 'Ce soir \u2014 ' + t.label;
    teaserDateVal.textContent = '22h \u2014 3h';
    teaserLineup.innerHTML = t.lineup.map(a =>
      `<div class="teaser-lineup-item">${a.name}<span>${a.time}</span></div>`
    ).join('');
    document.getElementById('teaserLineupWrap').style.display = '';
  } else {
    document.getElementById('teaserDateLabel').textContent = 'Trois soirs';
    teaserDateVal.textContent = '2 \u2014 4 juillet \u00b7 22h \u2014 3h';
    document.getElementById('teaserLineupWrap').style.display = 'none';
  }
}

// ---- MODE : bascule menu <-> teaser ----
function setMode(next) {
  if (mode === next) return;
  mode = next;
  if (next === 'teaser') {
    clearTimeout(timer);
    renderTeaser();
    teaser.classList.add('show');
  } else {
    teaser.classList.remove('show');
    goTo(0, false);
  }
}

// ---- RENDU DU MENU ----
function priceHTML(item) {
  const clean = String(item.price).replace('.', ',');
  const doubleStr = item.double ? `<span class="double">double ${item.double}$</span>` : '';
  return `<div class="price">${clean}<small>$</small>${doubleStr}</div>`;
}

function itemHTML(item, i) {
  if (item.divider) return `<div class="divider reveal" style="--i:${i}">${item.divider}</div>`;
  const badge = item.badge ? `<span class="badge ${item.badgeClass || ''}">${item.badge}</span>` : '';
  const desc = item.desc ? `<div class="desc">${item.desc}</div>` : '';
  return `
    <div class="item reveal" style="--i:${i}">
      <div>
        <div class="name">${item.name}${badge}</div>
        ${desc}
      </div>
      ${priceHTML(item)}
    </div>`;
}

function shotsHTML(cat) {
  let i = 0;
  const groups = cat.groups.map(g => {
    const cells = g.items.map(it => {
      i++;
      const sub = it.sub ? `<span class="sub">${it.sub}</span>` : '';
      return `<div class="shot-cell reveal" style="--i:${i}">${it.name}${sub}</div>`;
    }).join('');
    return `
      <div class="shots-layout">
        <div class="shot-price">
          <div class="big">${g.price}$</div>
          <div class="label">Forts</div>
        </div>
        <div class="shot-grid">${cells}</div>
      </div>`;
  }).join('');
  return groups;
}

function render(cat) {
  titleEl.textContent = cat.title;
  subtitleEl.textContent = cat.subtitle;
  if (cat.shots) {
    content.className = 'content';
    content.innerHTML = shotsHTML(cat);
  } else {
    const realItems = cat.items.filter(x => !x.divider).length;
    const dividers = cat.items.filter(x => x.divider).length;
    const compact = realItems >= 8 || dividers >= 2;
    content.className = 'content' + (cat.single ? ' single' : '') + (compact ? ' compact' : '');
    content.innerHTML = cat.items.map(itemHTML).join('');
  }
  [...nav.children].forEach((el, i) => el.classList.toggle('active', i === index));
  progressEl.classList.remove('run');
  void progressEl.offsetWidth;
  progressEl.classList.add('run');
}

function goTo(i, animate = true) {
  clearTimeout(timer);
  index = ((i % categories.length) + categories.length) % categories.length;
  if (animate) {
    wipe.classList.remove('run');
    void wipe.offsetWidth;
    wipe.classList.add('run');
    setTimeout(() => render(categories[index]), 310);
  } else {
    render(categories[index]);
  }
  timer = setTimeout(() => goTo(index + 1), SLIDE_DURATION);
}

// ---- NAV ----
categories.forEach((cat, i) => {
  const pill = document.createElement('div');
  pill.className = 'nav-pill' + (i === 0 ? ' active' : '');
  pill.textContent = cat.title;
  pill.addEventListener('click', () => { if (mode === 'menu') goTo(i); });
  nav.appendChild(pill);
});

// ---- CLAVIER (utile en test) ----
window.addEventListener('keydown', e => {
  if (mode !== 'menu') return;
  if (e.key === 'ArrowRight') goTo(index + 1);
  if (e.key === 'ArrowLeft')  goTo(index - 1);
});

updateClock();
setInterval(updateClock, 1000);
</script>

</html>
